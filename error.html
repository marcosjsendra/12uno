<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Error | 12uno</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Manrope', system-ui, sans-serif;
      background: #0d0d0d;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .error-container {
      text-align: center;
      max-width: 500px;
    }
    .error-code {
      font-size: 8rem;
      font-weight: 700;
      color: #d97706;
      line-height: 1;
      margin-bottom: 1rem;
    }
    .error-title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }
    .error-desc {
      color: #999;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    .error-link {
      display: inline-block;
      color: #d97706;
      text-decoration: none;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    .error-link:hover {
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-code">404</div>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-desc">The page you're looking for doesn't exist or has been moved.</p>
    <a href="/" class="error-link">Return Home</a>
  </div>
</body>
</html>
